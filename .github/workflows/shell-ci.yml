name: Shell CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check (bash -n)
        run: |
          for f in lib/*.sh scripts/*.sh; do
            echo "Checking $f..."
            bash -n "$f"
          done
          echo "Checking deploy_mt.sh..."
          bash -n deploy_mt.sh
          echo "Checking smoke-mtproto.sh..."
          bash -n smoke-mtproto.sh

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning
